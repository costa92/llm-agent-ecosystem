name: umbrella

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: umbrella-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-repo-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout umbrella root
        uses: actions/checkout@v4

      - name: Checkout llm-agent
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent
          ref: main
          path: llm-agent

      - name: Checkout llm-agent-rag
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-rag
          ref: master
          path: llm-agent-rag

      - name: Checkout llm-agent-otel
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-otel
          ref: main
          path: llm-agent-otel

      - name: Checkout llm-agent-providers
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-providers
          ref: main
          path: llm-agent-providers

      - name: Checkout llm-agent-customer-support
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-customer-support
          ref: main
          path: llm-agent-customer-support

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: false

      - name: Validate umbrella root files
        run: |
          test -f README.md
          test -f PROJECT.md
          test -f .planning/PROJECT.md
          test -f .planning/README.md
          test -f go.work

      - name: Build llm-agent
        working-directory: llm-agent
        run: |
          GOWORK=off go vet ./...
          GOWORK=off go build ./...
          GOWORK=off go test ./... -count=1

      - name: Build llm-agent-rag
        working-directory: llm-agent-rag
        run: |
          GOWORK=off go vet ./...
          GOWORK=off go build ./...
          GOWORK=off go test ./... -count=1

      - name: Build llm-agent-otel
        working-directory: llm-agent-otel
        run: |
          GOWORK=off go vet ./...
          GOWORK=off go build ./...
          GOWORK=off go test ./... -count=1

      - name: Build llm-agent-providers
        working-directory: llm-agent-providers
        run: |
          GOWORK=off go vet ./...
          GOWORK=off go build ./...
          GOWORK=off go test ./... -count=1

      - name: Build llm-agent-customer-support
        working-directory: llm-agent-customer-support
        run: |
          GOWORK=off go vet ./...
          GOWORK=off go build ./...
          GOWORK=off go test ./... -count=1

      - name: B3 — depcheck cascade tool (informational)
        working-directory: cmd/depcheck
        run: |
          GOWORK=off go vet ./...
          GOWORK=off go test ./... -count=1
          # Emit cascade JSON as a build artifact for operators. Don't
          # fail the umbrella on staleness — that's dep-currency-check.sh's
          # job. Exit-1 from depcheck means stale; swallow it here.
          GOWORK=off go run . --json | tee depcheck.json || true
          GOWORK=off go run . || true

      - name: Upload depcheck artifact
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-cascade
          path: cmd/depcheck/depcheck.json
          if-no-files-found: warn

  smoke:
    name: B2 — flowd binary smoke gate
    needs: cross-repo-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout umbrella root
        uses: actions/checkout@v4

      - name: Checkout llm-agent
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent
          ref: main
          path: llm-agent

      - name: Checkout llm-agent-flow
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-flow
          ref: main
          path: llm-agent-flow

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: false

      - name: Build flowd
        working-directory: llm-agent-flow
        run: |
          GOWORK=off go build -o /tmp/flowd ./cmd/flowd

      - name: Start flowd in background
        run: |
          /tmp/flowd --addr 127.0.0.1:7861 --token= > /tmp/flowd.log 2>&1 &
          echo $! > /tmp/flowd.pid
          echo "flowd pid=$(cat /tmp/flowd.pid)"

      - name: Probe /healthz
        run: |
          sleep 2
          curl -fsS http://127.0.0.1:7861/healthz
          echo

      - name: Probe /flows (auth-disabled — token empty)
        run: |
          curl -fsS http://127.0.0.1:7861/flows
          echo

      - name: Stop flowd
        if: always()
        run: |
          if [ -f /tmp/flowd.pid ]; then
            pid=$(cat /tmp/flowd.pid)
            kill -TERM "$pid" 2>/dev/null || true
            # give it a moment to exit cleanly
            for i in 1 2 3 4 5; do
              if ! kill -0 "$pid" 2>/dev/null; then break; fi
              sleep 1
            done
            kill -KILL "$pid" 2>/dev/null || true
          fi

      - name: Dump flowd log on failure
        if: failure()
        run: |
          echo "----- flowd.log -----"
          cat /tmp/flowd.log || true

  stdlib-only-gate:
    name: B4 — core llm-agent stdlib-only assertion
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout umbrella root
        uses: actions/checkout@v4

      - name: Checkout llm-agent
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent
          ref: main
          path: llm-agent

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: false

      - name: Run stdlib-only assertion gate
        run: bash scripts/stdlib-only-check.sh
